    <style>
        /* CSS Reset & Variable Setup */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        :root {
            --primary-color: #0d121f; /* Cosmic Navy */
            --accent-color: #d4af37;  /* Elegant gold */
            --text-light: #f8fafc;    /* Soft off-white */
            --text-dark: #334155;     /* Slate dark text */
            --bg-light: #fcfbf7;      /* Warm, paper-like background */
        }

        body {
            font-family: 'Georgia', 'Gautami', serif;
            background-color: var(--bg-light);
            color: var(--text-dark);
            line-height: 1.8;
        }

        /* Language Switcher Navbar */
        .lang-nav {
            position: fixed;
            top: 0;
            right: 0;
            left: 0;
            height: 60px;
            background: rgba(13, 18, 31, 0.85);
            backdrop-filter: blur(10px);
            display: flex;
            justify-content: flex-end;
            align-items: center;
            padding: 0 2rem;
            z-index: 1000;
            border-bottom: 1px solid rgba(212, 175, 55, 0.2);
        }

        .lang-btn {
            background: transparent;
            color: var(--text-light);
            border: 1px solid rgba(255, 255, 255, 0.3);
            padding: 0.35rem 1rem;
            margin-left: 0.5rem;
            cursor: pointer;
            font-family: inherit;
            font-size: 0.9rem;
            transition: all 0.3s ease;
        }

        .lang-btn.active {
            background-color: var(--accent-color);
            color: var(--primary-color);
            border-color: var(--accent-color);
            font-weight: bold;
        }
