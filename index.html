<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Righteous Path | Follow His Footsteps</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Inter:wght@300;400;600&family=Ramabhadra&family=Noto+Sans+Telugu:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-color: #1a252f;
            --accent-color: #b89742; /* Premium Gold Accent */
            --text-dark: #2c3e50;
            --text-light: #f8f9fa;
            --bg-light: #fdfbf7; /* Off-white warm background */
            --transition-speed: 0.3s;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', 'Noto Sans Telugu', sans-serif;
            background-color: var(--bg-light);
            color: var(--text-dark);
            line-height: 1.8;
            overflow-x: hidden;
        }

        /* Lang display controller */
        .lang-en, .lang-te {
            display: none !important;
        }
        
        html[lang="en"] .lang-en {
            display: block !important;
        }
        
        html[lang="te"] .lang-te {
            display: block !important;
        }

        /* Inline handling for buttons/spans */
        html[lang="en"] span.lang-en, html[lang="en"] a.lang-en {
            display: inline-block !important;
        }
        html[lang="te"] span.lang-te, html[lang="te"] a.lang-te {
            display: inline-block !important;
        }

        /* Language Switcher Bar */
        .lang-switcher-container {
            background-color: var(--primary-color);
            padding: 10px 24px;
            display: flex;
            justify-content: flex-end;
            gap: 12px;
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom: 2px solid var(--accent-color);
        }

        .lang-btn {
            background: transparent;
            border: 1px solid transparent;
            color: #a0aec0;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 600;
            padding: 6px 14px;
            border-radius: 4px;
            transition: all var(--transition-speed);
        }

        .lang-btn:hover {
            color: var(--text-light);
        }

        .lang-btn.active {
            color: var(--text-light);
            border-color: var(--accent-color);
            background-color: rgba(184, 151, 66, 0.2);
        }

        /* Hero Section */
        .hero {
            background: linear-gradient(rgba(26, 37, 47, 0.85), rgba(26, 37, 47, 0.95)), 
                        url('https://images.unsplash.com/photo-1447752875215-b2761acb3c5d?auto=format&fit=crop&q=80&w=1920') no-repeat center center/cover;
            color: var(--text-light);
            text-align: center;
            padding: 120px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 70vh;
        }

        .hero h1 {
            font-family: 'Cinzel', 'Ramabhadra', serif;
            font-size: 3.5rem;
            letter-spacing: 2px;
            margin-bottom: 24px;
            color: var(--text-light);
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        html[lang="te"] .hero h1 {
            font-family: 'Ramabhadra', 'Noto Sans Telugu', sans-serif;
            font-size: 3.2rem;
        }

        .hero p.quote {
            font-style: italic;
            max-width: 800px;
            font-size: 1.25rem;
            margin-bottom: 40px;
            color: #e2e8f0;
            position: relative;
        }

        .cta-button {
            display: inline-block;
            background-color: var(--accent-color);
            color: var(--primary-color);
            padding: 14px 32px;
            font-weight: 700;
            text-decoration: none;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-radius: 30px;
            box-shadow: 0 4px 15px rgba(184, 151, 66, 0.3);
            transition: all var(--transition-speed);
        }

        .cta-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(184, 151, 66, 0.5);
            background-color: #c9a852;
        }

        /* Main Content Styling */
        .section-container {
            max-width: 1100px;
            margin: 80px auto;
            padding: 0 20px;
        }

        .section-title {
            text-align: center;
            font-family: 'Cinzel', 'Ramabhadra', serif;
            font-size: 2.5rem;
            color: var(--primary-color);
            margin-bottom: 20px;
            position: relative;
            padding-bottom: 15px;
        }

        .section-title::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 80px;
            height: 3px;
            background-color: var(--accent-color);
        }

        .intro-text {
            text-align: center;
            max-width: 850px;
            margin: 0 auto 50px auto;
            font-size: 1.15rem;
            color: #4a5568;
        }

        /* Featured Verse Box */
        .verse-box {
            background-color: #fff;
            border-left: 4px solid var(--accent-color);
            padding: 30px;
            border-radius: 0 8px 8px 0;
            box-shadow: 0 5px 15px rgba(0,0,0,0.04);
            margin: 40px 0;
            font-style: italic;
        }

        .verse-context {
            display: block;
            margin-top: 10px;
            font-weight: 600;
            font-style: normal;
            color: var(--accent-color);
        }

        /* Feature/Ministry Cards Grid */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 40px;
            margin-top: 60px;
        }

        .card {
            background: #ffffff;
            border-radius: 8px;
            padding: 40px 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            border-top: 3px solid transparent;
            transition: all var(--transition-speed);
        }

            transform: translateY(-5px);
            border-top-color: var(--accent-color);
